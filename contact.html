</head>
<body>

<header class="header" id="header">
  <div class="container header-inner">
    <a href="index.html"><img src="img/logo.svg" alt="NATOBEE" class="logo-img"></a>
    <nav>
      <ul class="nav-list" id="navList">
        <li><a href="index.html#why">選ばれる理由</a></li>
        <li><a href="index.html#curriculum">研修カリキュラム</a></li>

      </ul>
    </nav>
    <div class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></div>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>お問い合わせ</h1>
    <p>CONTACT</p>
  </div>
</section>

<section class="section">
  <div class="container contact-form">
    <p style="text-align:center; margin-bottom:40px; color:#888; font-size:15px;">
      YouTube活用に関するご質問・無料相談のお申し込みは、<br>下記フォームよりお気軽にお問い合わせください。
    </p>
    <form action="https://formsubmit.co/narubusiness1@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="【ナトビーHP】お問い合わせ">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="thanks.html">
      <input type="text" name="_honey" style="display:none">
      <div class="form-group">
        <label>会社名 <span class="required">必須</span></label>
        <input type="text" name="company" required placeholder="例：株式会社サンプル">
      </div>
      <div class="form-group">
        <label>お名前 <span class="required">必須</span></label>
        <input type="text" name="name" required placeholder="例：山田 太郎">
      </div>
      <div class="form-group">
        <label>メールアドレス <span class="required">必須</span></label>
        <input type="email" name="email" required placeholder="例：yamada@example.com">
      </div>
      <div class="form-group">
        <label>電話番号</label>
        <input type="tel" name="phone" placeholder="例：090-1234-5678">
      </div>
      <div class="form-group">
        <label>お問い合わせ内容 <span class="required">必須</span></label>
        <textarea name="message" required placeholder="現在のYouTube運用状況やご相談内容をご記入ください"></textarea>
      </div>
      <div class="form-submit">
        <button type="submit" class="btn btn-primary">送信する</button>
      </div>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div>
        <img src="img/logo-white.svg" alt="NATOBEE" class="footer-logo-img">
        <p class="footer-desc">株式会社ナトビー<br>売上につなげるYouTube内製化研修</p>
      </div>

      <div class="footer-nav"><h4>Company</h4><a href="company.html">会社概要</a><a href="contact.html">お問い合わせ</a></div>
    </div>
    <div class="footer-bottom">&copy; 2026 株式会社ナトビー All Rights Reserved.</div>
  </div>
</footer>
<script src="js/main.js"></script>
</body>
</html>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="img/logo.svg" type="image/svg+xml">
  <style>
    .contact-box {
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }
    .contact-box p.lead {
      font-size: 16px;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.9;
    }
    .contact-email-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
    }
    .contact-email-label {
      font-size: 13px;
      color: #999;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .contact-email-link {
      display: inline-block;
      font-size: 22px;
      font-weight: 700;
      color: #e63946;
      letter-spacing: 0.02em;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .contact-email-link:hover {
      border-bottom-color: #e63946;
    }
    .contact-note {
      margin-top: 24px;
      font-size: 14px;
      color: #aaa;
    }
    @media (max-width: 768px) {
      .contact-email-link { font-size: 18px; }
      .contact-email-card { padding: 36px 24px; }
    }
  </style>
</head>
